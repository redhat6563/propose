
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>

body{
margin:0;
padding:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
color:white;
text-align:center;
overflow-x:hidden;
}

.container{
margin-top:80px;
}

h1{
font-size:45px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px white;}
to{ text-shadow:0 0 30px pink;}
}

#message{
font-size:22px;
width:80%;
margin:auto;
margin-bottom:30px;
min-height:80px;
}

.gallery img{
width:160px;
height:160px;
border-radius:15px;
margin:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
transition:0.4s;
object-fit:cover;
}

.gallery img:hover{
transform:scale(1.1);
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:30px;
margin:20px;
cursor:pointer;
}

#yes{
background:white;
color:#ff4d6d;
}

#no{
background:black;
color:white;
position:relative;
}

.heart{
position:fixed;
bottom:-20px;
font-size:24px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

</style>
</head>

<body>

<div class="container">

<h1> Bubu ❤️</h1>

<div id="message"></div>

<div class="gallery">

<img src="photo1.JPG">
<img src="photo2.JPG">
<img src="photo3.JPG">
<img src="photo4.JPG">
<img src="photo5.JPG">
<img src="photo6.JPG">
<img src="photo7.JPG">
<img src="photo8.JPG">

</div>

<h2>Will you be with me again and make our present beautiful? 💍<h2>

<button id="yes">YES ❤️</button>
<button id="no">NO</button>

</div>

<script>

const text = "Two years ago, we shared something beautiful together. Life took us in different directions and we ended up breaking apart, but the truth is… the love between us never really disappeared. Even today, deep inside my heart, I know how much we still care about each other. Maybe we don’t know what the future holds for us, and maybe things are not perfect, but one thing I know for sure is that every moment spent with you means the world to me. I don’t want to lose the chance to be with you in the present. So today, I just want to ask you something simple from my heart — can we be together again and cherish the moments we have, right now? ❤️;

let i=0;

function typing(){
if(i<text.length){
document.getElementById("message").innerHTML += text.charAt(i);
i++;
setTimeout(typing,40);
}
}

typing();

document.getElementById("yes").onclick=function(){
alert("I love you so much ❤️");
}

document.getElementById("no").onmouseover=function(){
this.style.position="absolute";
this.style.left=Math.random()*90+"%";
this.style.top=Math.random()*90+"%";
}

function hearts(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},6000);
}

setInterval(hearts,300)

</script>

</body>
</html>
:::
